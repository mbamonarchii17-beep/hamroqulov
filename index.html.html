<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzum Market Analog — Hamroqulov Ibrohim</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f5f7; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .logo { color: #7000ff; font-weight: bold; font-size: 22px; text-decoration: none; }
        .logo span { color: #333; font-size: 16px; font-weight: normal; }
        .search-box { flex: 1; max-w: 500px; }
        .search-box input { width: 100%; padding: 8px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        .search-box input:focus { border-color: #7000ff; }
        .nav-buttons { display: flex; gap: 10px; }
        
        button { cursor: pointer; border: none; font-weight: 600; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        .btn-admin { background: #ff9800; color: white; padding: 8px 16px; }
        .btn-admin:hover { background: #e68a00; }
        .btn-cart { background: #ede3ff; color: #7000ff; padding: 8px 16px; position: relative; }
        .btn-cart:hover { background: #dfceff; }
        #cartCount { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        main { max-w: 1200px; width: 100%; margin: 0 auto; padding: 20px; flex-grow: 1; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        @media (max-width: 500px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

        .card { background: white; border: 1px solid #eef0f2; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; position: relative; transition: 0.3s; }
        .card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .card-click-area { cursor: pointer; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #f9f9f9; }
        .card h3 { font-size: 14px; color: #333; margin: 8px 0; font-weight: 500; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card h3:hover { color: #7000ff; }
        .card .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .card .price { font-weight: bold; color: #1f2937; font-size: 16px; }
        .card .btn-add-item { background: #f4f5f7; color: #333; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .card .btn-add-item:hover { background: #7000ff; color: white; }

        /* 🔒 FAQAT ADMIN UCHUN KARTODAGI O'CHIRISH TUGMASI */
        .admin-card-delete { display: none; background: #ef4444; color: white; font-size: 12px; padding: 6px; width: 100%; text-align: center; margin-top: 10px; border-radius: 6px; }
        .admin-card-delete:hover { background: #dc2626; }
        /* Admin ochiqligini bildiruvchi stil */
        body.admin-mode .admin-card-delete { display: block; }

        /* MODAL OYNALAR */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.2s ease-in-out; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; max-w: 500px; width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .close-btn { font-size: 28px; color: #999; cursor: pointer; background: none; font-weight: normal; }
        .close-btn:hover { color: #333; }

        /* 🛒 KENG SAVAT MODALI (Full Screen) */
        .modal-cart-full { background: white; width: 100%; height: 100%; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px 20px; border-radius: 8px; margin-bottom: 10px; font-size: 15px; }
        .btn-remove-item { background: #fee2e2; color: #ef4444; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; margin-left: 15px; border: 1px solid #fca5a5; }
        .btn-remove-item:hover { background: #ef4444; color: white; }
        .btn-checkout-full { width: 100%; background: #7000ff; color: white; padding: 16px; font-size: 16px; border-radius: 8px; font-weight: bold; }
        .btn-checkout-full:hover { background: #5900cc; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 14px; }
        .form-group textarea { resize: none; height: 60px; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: #7000ff; }
        .btn-submit { background: #10b981; color: white; width: 100%; padding: 12px; margin-top: 10px; font-size: 14px; }
        .btn-submit:hover { background: #059669; }

        .admin-list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; max-height: 140px; overflow-y: auto; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px 12px; border: 1px solid #e9ecef; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
        .btn-del { background: #ef4444; color: white; padding: 4px 10px; font-size: 12px; }
        .btn-del:hover { background: #dc2626; }

        .detail-img { width: 100%; height: 240px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #f9f9f9; }
        .detail-title { font-size: 18px; color: #111; font-weight: 600; margin-bottom: 10px; }
        .detail-price { font-size: 20px; color: #7000ff; font-weight: bold; margin-bottom: 15px; }
        .detail-desc-title { font-size: 13px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px; }
        .detail-desc-text { font-size: 14px; color: #444; line-height: 1.5; background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #7000ff; margin-bottom: 20px; }

        footer { background: #111827; color: #9ca3af; padding: 20px; text-align: center; margin-top: 40px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .author-box { background: #1f2937; padding: 6px 12px; border-radius: 6px; border: 1px solid #374151; color: #c084fc; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">UZUM <span>ANALOG</span></a>
        <div class="search-box">
            <input type="text" id="searchInput" oninput="searchProducts()" placeholder="Mahsulot nomini yozib qidiring...">
        </div>
        <div class="nav-buttons">
            <button onclick="openAdmin()" class="btn-admin">⚙️ Admin Panel</button>
            <button onclick="openCart()" class="btn-cart">Savat <span id="cartCount">0</span></button>
        </div>
    </header>

    <main>
        <div class="main-header">
            <h2>Mahsulotlar katalogi</h2>
            <div style="font-size: 14px; color: #666;">Jami: <b id="productTotalCount" style="color:#7000ff">0</b> ta</div>
        </div>
        <div id="productsGrid" class="grid"></div>
    </main>

    <!-- ⚙️ ADMIN PANEL -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ Admin boshqaruv paneli</h3>
                <span onclick="closeAdmin()" class="close-btn">&times;</span>
            </div>
            
            <div class="form-group">
                <label>Mahsulot nomi *</label>
                <input type="text" id="prodTitle" placeholder="Masalan: Yangi mahsulot">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Narxi (so'm) *</label>
                    <input type="number" id="prodPrice" placeholder="10000">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Eski narxi (ixtiyoriy)</label>
                    <input type="number" id="prodOldPrice" placeholder="15000">
                </div>
            </div>
            <div class="form-group">
                <label>Rasm manzili (URL) *</label>
                <input type="text" id="prodImage" value="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=400">
            </div>
            <div class="form-group">
                <label>Mahsulot tavsifi *</label>
                <textarea id="prodDesc" placeholder="Batafsil ma'lumot..."></textarea>
            </div>
            <button onclick="addNewProduct()" class="btn-submit">✅ TIZIMGA QO'SHISH</button>

            <div class="admin-list" id="adminProductsList"></div>
        </div>
    </div>

    <!-- 📄 DETAL MODAL -->
    <div id="productDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Mahsulot haqida batafsil</h3>
                <span onclick="closeProductDetail()" class="close-btn">&times;</span>
            </div>
            <div id="productDetailBody"></div>
        </div>
    </div>

    <!-- 🛒 SAVAT MODAL (FULL SCREEN) -->
    <div id="cartModal" class="modal">
        <div class="modal-cart-full">
            <div>
                <div class="modal-header">
                    <h2 style="font-weight: bold; font-size: 20px;">Xarid Savati</h2>
                    <span onclick="closeCart()" class="close-btn" style="font-size: 32px;">&times;</span>
                </div>
                <div id="cartItemsList" style="display:flex; flex-direction:column; gap:10px; margin-top: 20px;"></div>
            </div>
            
            <div style="border-top:1px solid #eee; padding-top:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold; font-size: 18px;">
                    <span>Jami summa:</span>
                    <span id="cartTotalPrice" style="color:#7000ff; font-size:22px;">0 so'm</span>
                </div>
                <button onclick="checkout()" class="btn-checkout-full">Buyurtma berish</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Uzum Analog. Barcha huquqlar himoyalangan.</p>
        <div class="author-box">Loyiha muallifi: Hamroqulov Ibrohim</div>
    </footer>

    <script>
        // Rasmda keltirilgan hamma mahsulotlar ro'yxati
        const defaultProducts = [
            { id: 1, title: "Smartfon Xiaomi Redmi Note 13 8/256 GB", price: 2450000, image_url: "https://images.unsplash.com/photo-1598327105666-5b89351aff97?q=80&w=400", description: "Smartfon xususiyatlari." },
            { id: 2, title: "Erkaklar shimi", price: 120000, image_url: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?q=80&w=400", description: "Sifatli klassik erkaklar shimi." },
            { id: 3, title: "Coca cola 1,5L", price: 15000, image_url: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=400", description: "Yaxna ichimlik Coca-Cola." },
            { id: 4, title: "Velosiped", price: 130000, image_url: "https://images.unsplash.com/photo-1485965120184-e220f721d03e?q=80&w=400", description: "Sport va sayr velosipedi." },
            { id: 5, title: "Erkaklar kepkasi", price: 14000, image_url: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=400", description: "Erkaklar uchun qora kepka." }
        ];

        let products = JSON.parse(localStorage.getItem('uzum_products'));
        if (!products || products.length === 0) {
            products = defaultProducts;
            localStorage.setItem('uzum_products', JSON.stringify(products));
        }

        let cart = [];

        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            document.getElementById('productTotalCount').innerText = list.length;
            grid.innerHTML = '';
            
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-click-area" onclick="openProductDetail(${p.id})">
                            <img src="${p.image_url}">
                            <h3>${p.title}</h3>
                        </div>
                        <div class="price-row">
                            <span class="price">${p.price.toLocaleString()} so'm</span>
                            <button onclick="addToCart(${p.id})" class="btn-add-item">+</button>
                        </div>
                        <!-- FAQAT ADMIN REJIMIDA KO'RINADIGAN O'CHIRISH BUTTONI -->
                        <button onclick="deleteProduct(${p.id})" class="admin-card-delete">🗑️ Tizimdan o'chirish</button>
                    </div>`;
            });
        }

        function openProductDetail(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const body = document.getElementById('productDetailBody');
            body.innerHTML = `
                <img src="${product.image_url}" class="detail-img">
                <h2 class="detail-title">${product.title}</h2>
                <div class="detail-price">${product.price.toLocaleString()} so'm</div>
                <div class="detail-desc-text">${product.description || "Ma'lumot mavjud emas."}</div>
                <button onclick="addToCart(${product.id}); closeProductDetail();" style="width:100%; background:#7000ff; color:white; padding:12px; font-size:15px;">🛒 SAVATGA QO'SHISH</button>
            `;
            document.getElementById('productDetailModal').classList.add('active');
        }

        function closeProductDetail() { document.getElementById('productDetailModal').classList.remove('active'); }

        function addToCart(id) {
            const pr = products.find(p => p.id === id);
            const inCart = cart.find(c => c.product.id === id);
            if(inCart) inCart.quantity++;
            else cart.push({ product: pr, quantity: 1 });
            updateCart();
        }

        function removeCartItem(id) {
            cart = cart.filter(c => c.product.id !== id);
            updateCart();
        }

        function updateCart() {
            let totalQty = 0, totalPrice = 0;
            const list = document.getElementById('cartItemsList');
            list.innerHTML = cart.length === 0 ? '<div style="color:#999; text-align:center; padding:40px;">Savat bo\'sh</div>' : '';

            cart.forEach(c => {
                totalQty += c.quantity;
                totalPrice += c.product.price * c.quantity;
                
                list.innerHTML += `
                    <div class="cart-item-row">
                        <span style="font-weight: 500;">${c.product.title}</span>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span style="font-weight: bold;">${c.quantity} ta - ${(c.product.price * c.quantity).toLocaleString()} so'm</span>
                            <button onclick="removeCartItem(${c.product.id})" class="btn-remove-item">O'chirish</button>
                        </div>
                    </div>`;
            });

            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartTotalPrice').innerText = totalPrice.toLocaleString() + " so'm";
        }

        // 🔒 ADMIN BOSHQARUVI FUNKSIYALARI
        function openAdmin() {
            document.body.classList.add('admin-mode'); // Sahifaga admin rejimini yoqamiz
            document.getElementById('adminModal').classList.add('active');
            renderAdminList();
        }
        
        function closeAdmin() {
            document.body.classList.remove('admin-mode'); // Admin yopilganda rejim o'chadi
            document.getElementById('adminModal').classList.remove('active');
        }

        function deleteProduct(id) {
            if(confirm("Haqiqatan ham ushbu mahsulotni tizimdan o'chirmoqchimisiz?")) {
                products = products.filter(p => p.id !== id);
                cart = cart.filter(c => c.product.id !== id); // Savatdan ham olib tashlaymiz
                localStorage.setItem('uzum_products', JSON.stringify(products));
                renderProducts(products);
                updateCart();
                renderAdminList();
            }
        }

        function addNewProduct() {
            const title = document.getElementById('prodTitle').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const imgUrl = document.getElementById('prodImage').value.trim();
            const desc = document.getElementById('prodDesc').value.trim();

            if (!title || isNaN(price) || price <= 0) { alert("Ma'lumotlarni to'liq kiriting!"); return; }

            products.push({ id: Date.now(), title, price, image_url: imgUrl, description: desc });
            localStorage.setItem('uzum_products', JSON.stringify(products));
            renderProducts(products);
            renderAdminList();
            alert("Mahsulot qo'shildi! ✅");
        }

        function renderAdminList() {
            const container = document.getElementById('adminProductsList');
            container.innerHTML = '<h4 style="font-size:12px; color:#ef4444; margin-bottom:10px;">MAHSULOTLAR RO\'YXATI:</h4>';
            products.forEach(p => {
                container.innerHTML += `
                    <div class="admin-item">
                        <span>${p.title}</span>
                        <button onclick="deleteProduct(${p.id})" class="btn-del">O'chirish</button>
                    </div>`;
            });
        }

        function openCart() { document.getElementById('cartModal').classList.add('active'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('active'); }
        function searchProducts() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.title.toLowerCase().includes(text));
            renderProducts(filtered);
        }
        function checkout() {
            if(cart.length === 0) { alert("Savat bo'sh!"); return; }
            alert("Buyurtma qabul qilindi!\nYaratuvchi: Hamroqulov Ibrohim");
            cart = []; updateCart(); closeCart();
        }

        renderProducts(products);
    </script>
</body>
</html>
